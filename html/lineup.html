<div class="container" ng-controller="lineupController">

  <!-- Csapat kiválasztás -->
  <div class="row mt-5">
    <div class="mx-3 d-flex align-items-center">

      <img style="height: 30px; width: 30px;" class="mx-3">

      <select name="lineup"
              id="lineup"
              class="form-select"
              ng-model="kivalasztott_csapat"
              ng-change="csapat_kivalsztas()">

        <option ng-repeat="nev in Csapatnev" value="{{ nev }}">
          {{ nev }}
        </option>

      </select>

    </div>
  </div>

  <!-- Játékosok listája -->
  <div class="row mt-5">
    <h2>Aktuális játékos keretek</h2>

    <table class="table table-striped table-bordered">

      <!-- Dinamikus fejléc -->
      <thead>
        <tr ng-if="data.length">
          <th  ng-repeat="(key, value) in data[0]" >
            {{ key }}
          </th>
        </tr>
      </thead>

      <tbody>

        <!-- Dinamikus sorok: csak a kiválasztott csapat -->
        <tr ng-repeat="row in data" ng-if="row.Csapatnev === kivalasztott_csapat">
          <td ng-repeat="(key, value) in row">{{ value }}</td>
        </tr>

        <!-- Nincs adat -->
        <tr ng-if="!data.length">
          <td colspan="10">Nincs adat</td>
        </tr>

      </tbody>
    </table>
  </div>

</div>
