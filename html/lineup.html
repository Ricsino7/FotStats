<div class="container">
  <div class="row mt-5">
    <div class="mx-3 d-flex align-items-center">
      <img style="height: 30px; width: 30px;"
      		 class="mx-3">
      <select name="tabella"
              id="tabella"
              class="form-select"
              ng-model="kivalasztott_csapat"
              ng-change="csapat_kivalsztas()">
        <option ng-repeat="nev in Csapatnev" value="{{ Csapatnev }}">
          {{ Csapatnev }}
        </option>      
      </select>
    </div>
  </div>
  <div class="row mt-5">
    <h2>Aktuális játékos keretek</h2>
      <table class="table table-striped table-bordered">
        <thead>
          <tr>
            <th ng-repeat="(key, value) in data[0]">{{ key }}</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="row in data" 
              ng-if="kivalasztott_csapat === row.Csapatnev">
            <td ng-repeat="(key, value) in row">{{ value }}</td>
          </tr>
          <tr ng-if="!data.length">
            <td colspan="10">Nincs adat</td>
          </tr>
        </tbody>
      </table>
  </div>
</div>
