<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">

      <form class="p-4 border rounded shadow-sm">
        <!-- Email cim bekérese a bejelentkezéshez -->
        <div class="form-group mb-3">
          <label>{{ $root.lang.data.email }}</label>
          <input ng-model="loginData.email" placeholder="{{ $root.lang.data.email }}" type="text" class="form-control">
        </div>
        <!--Jelszó bekérése  -->
        <div class="form-group mb-3">
          <label>{{ $root.lang.data.password }}</label>
          <input ng-model="loginData.password" placeholder="Jelszó" type="{{ $root.lang.data.password }}" class="form-control">
        </div>
        <!-- jegyez meg checkbox -->
        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input">
          <label class="form-check-label">{{ $root.lang.data.show_pass }}</label>
        </div>
        <!-- Bejelentkezés gomb login véglegesitése -->
        <button type="submit" ng-click="loginButton()" class="btn btn-primary w-100">
          {{ $root.lang.data.bejelent }}
        </button>
      </form>

    </div>
  </div>
</div>
