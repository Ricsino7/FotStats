<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">

      <form class="p-4 border rounded shadow-sm">

        <div class="form-group mb-3">
          <label>Családnév:</label>
          <input type="text" class="form-control">
        </div>

        <div class="form-group mb-3">
          <label>Keresztnév:</label>
          <input type="text" class="form-control">
        </div>

        <div class="form-group mb-3">
          <label>Email megadása:</label>
          <input type="email" class="form-control">
        </div>

        <div class="form-group mb-3">
          <label>Jelszó megadása:</label>
          <input type="password" class="form-control">
        </div>

        <div class="form-group mb-3">
          <label>Jelszó megadása mégegyszer!</label>
          <input type="password" class="form-control">
        </div>

        <div class="form-group mb-3">
          <label>Felhasználónév:</label>
          <input type="text" class="form-control">
        </div>

        <div class="form-group mb-4">
          <label class="fw-bold d-block mb-2">Elmúltál 18?</label>

          <div class="d-flex gap-4">
            <div class="form-check">
              <input class="form-check-input"
                     type="radio"
                     name="age18"
                     id="igen"
                     required>
              <label class="form-check-label" for="igen">
                Igen
              </label>
            </div>

            <div class="form-check">
              <input class="form-check-input"
                     type="radio"
                     name="age18"
                     id="nem">
              <label class="form-check-label" 
                     for="nem">
                Nem
              </label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <button type="submit" class="btn btn-primary w-100">
            Regisztráció
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
