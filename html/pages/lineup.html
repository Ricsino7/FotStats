<div class="container" ng-controller="lineupController">

  <!-- Csapat kiválasztás -->
  <div class="row mt-5">
    <div class="mx-3 d-flex align-items-center">

      <img class="card-img-top mx-3"
     style="height: 80px; width: 110px;"  
     ng-src="./img/club_logos/{{kivalasztott_kep}}" 
     alt="Card image">


      <select name="lineup"
              id="lineup"
              class="form-select"
              ng-model="kivalasztott_csapat"
              ng-change="csapat_kivalsztas()">

        <option ng-repeat="nev in Csapatnev" value="{{ nev }}" ng-if="key !== 'kepek'">
          {{ nev }}
        </option>

      </select>

    </div>
  </div>

  <!-- Játékosok listája -->
  <div class="row mt-5">
    <h2>{{$root.lang.data.squad}}</h2>

    <table class="table table-striped table-bordered">

      <!-- Dinamikus fejléc -->
      <thead>
        <tr ng-if="data.length">
          <th  ng-repeat="(key, value) in data[0]" ng-if="key !== 'kepek' && key !== 'Csapatnev'">
            {{ key }}
          </th>
        </tr>
      </thead>

      <tbody>

        <!-- Dinamikus sorok: csak a kiválasztott csapat -->
        <tr ng-repeat="row in data" ng-if="row.Csapatnev === kivalasztott_csapat">
          <td ng-repeat="(key, value) in row" ng-if="key !== 'kepek' && key !== 'Csapatnev'">{{ value }}</td>
        </tr>

        <!-- Nincs adat -->
        <tr ng-if="!data.length" >
          <td colspan="10">Nincs adat</td>
        </tr>

      </tbody>
    </table>
  </div>

</div>
