<h1 class="text-center my-4">{{ $root.lang.data.results }}</h1>

<div class="container">
  <div class="row">
    <div class="col-12">

      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>{{ $root.lang.data.hazai }}</th>
            <th>{{ $root.lang.data.vendeg }}</th>
            <th>{{ $root.lang.data.results }}</th>
            <th>{{ $root.lang.data.datum }}</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="m in data">
            <td>{{ m.hazai }}</td>
            <td>{{ m.vendeg }}</td>
            <td><span class="badge bg-success">{{ m.eredmeny }}</span></td>
            <td>{{ m.datum }}</td>
            <td>
              <button class="btn btn-sm btn-primary" 
                      ng-click="reszletek(m)">
                {{ $root.lang.data.reszlet }}
              </button>
            </td>
          </tr>
          <tr ng-if="!data.length">
            <td colspan="5" class="text-center">Nincs meccs</td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>
</div>

<!-- Ide töltjük be a modalt -->
<div ng-include="'./html/components/modal.html'"></div>
