<div class="container">

  <!-- Oldal cím -->
  <h1 class="header display-5 fw-bold">
    {{ $root.lang.data.about }}
  </h1>

  <!-- Bemutatkozó szöveg -->
 <p class="text-center">
    {{ nyelv.aboutText }}
  </p>

  <!-- Csapat szekció - A JSON-ben lévő 'szponzi' (vagy 'csapatunk') kulcs -->
  <h3 class="text-center fw-bold">
    {{ $root.lang.data.team }}
  </h3>

  <div class="team">

    <!-- Csapattagok listája -->
    <div class="team-member"
         ng-repeat="member in teamMembers">

      <!-- Profilkép -->
      <img ng-src="{{member.image}}"
           alt="{{ nyelv[member.name] }}">

      <!-- Név - A nyelv objektumból keresi ki a member.name-ben lévő kulcs alapján -->
      <p>
        <strong>{{ nyelv[member.name] }}</strong>
      </p>
      
      <!-- Szerepkör - A nyelv objektumból keresi ki a member.role-ban lévő kulcs alapján -->
      <p>
        {{ nyelv[member.role] }}
      </p>

    </div>
  </div>

</div>
