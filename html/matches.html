<h1 class="fw-bold text-center my-4">Soron következő mérkőzések</h1>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-10">

      <!-- Kártya a táblának -->
      <div class="card-matches shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

          <table class="table modern-table matches-table">
            <thead>
              <tr>
                <th ng-repeat="(key, value) in data[0]">{{ key }}</th>
              </tr>
            </thead>

            <tbody>
              <tr ng-repeat="row in data">
                <td ng-repeat="(key, value) in row">{{ value }}</td>
              </tr>

              <tr ng-if="!data.length">
                <td colspan="10" class="text-center text-muted py-4">
                  Nincs adat
                </td>
              </tr>
            </tbody>
          </table>

        </div>
      </div>

    </div>
  </div>
</div>
