<div class="modal fade" id="reszletModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">
          {{ modalData.hazai }} - {{ modalData.vendeg }} ({{ modalData.eredmeny }})
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        
        <div ng-repeat="e in modalData.stat" 
             class="d-flex justify-content-between align-items-center mb-2 p-2 border-bottom">
          <div>
            <span class="badge bg-secondary me-2">{{ e.perc }}'</span>
            <strong>{{ e.csapat }}</strong>
            <span ng-if="e.jatekos" class="text-muted ms-2">({{ e.jatekos }})</span>
          </div>
          <div>
            <span ng-if="e.type == 'gol'" class="text-danger">⚽ Gól</span>
            <span ng-if="e.type == 'szoglet'" class="text-primary">🎯 Szöglet</span>
          </div>
        </div>

        <div ng-if="!modalData.stat.length" class="text-center text-muted py-4">
          Nincsenek események
        </div>

      </div>
    </div>
  </div>
</div>
