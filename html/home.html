<div class="container">
  <div class="row mt-5">
    <div class="mx-3 d-flex align-items-center gap-3">

      <img style="height: 30px; width: 30px;" class="rounded">

      <select name="tabella"
              id="tabella"
              class="form-select shadow-sm rounded-3"
              style="max-width: 250px;"
              ng-model="kivalasztott_tabella"
              ng-change="tabella_kivalasztas()">
        <option ng-repeat="Liga in Ligak" value="{{ Liga }}">
          {{ Liga }}
        </option>      
      </select>
    </div>
  </div>

  <div class="row mt-5 justify-content-center">
    <div class="col-lg-10">
      <h2 class="fw-bold mb-3">Aktuális tabellák</h2>

      <div class="card shadow-lg border-0 rounded-4 card-home">
        <div class="card-body p-4">

          <table class="table modern-table home-table">
            <thead>
              <tr>
                <th ng-repeat="(key, value) in data[0]">{{ key }}</th>
              </tr>
            </thead>

            <tbody>
              <tr ng-repeat="row in data" ng-if="kivalasztott_tabella === row.Liga">
                <td ng-repeat="(key, value) in row">{{ value }}</td>
              </tr>

              <tr ng-if="!data.length">
                <td colspan="10" class="text-center text-muted py-4">
                  Nincs adat
                </td>
              </tr>
            </tbody>
          </table>

        </div>
      </div>

    </div>
  </div>
</div>
